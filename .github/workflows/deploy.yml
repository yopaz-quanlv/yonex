name: Deploy to Yonex server

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-yonex-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Pull latest code on server
    runs-on:
      - self-hosted
      - yonex-server
    timeout-minutes: 10

    steps:
      - name: Update working tree
        shell: bash
        env:
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          cd /home/yopazvn/yonex

          current_branch="$(git branch --show-current)"
          if [[ "$current_branch" != "main" ]]; then
            echo "Expected branch main but found $current_branch" >&2
            exit 1
          fi

          git pull --ff-only origin main

          current_sha="$(git rev-parse HEAD)"
          if [[ "$current_sha" != "$DEPLOY_SHA" ]]; then
            echo "Expected $DEPLOY_SHA but deployed $current_sha" >&2
            exit 1
          fi
